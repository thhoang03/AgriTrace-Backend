name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main"]     
    
  pull_request:
    branches: [ "main"]
    
jobs:
  backend-build-and-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'     

    - name: Restore dependencies
      run: dotnet restore AgriTrace.slnx

    - name: Build Backend
      run: dotnet build AgriTrace.slnx --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test AgriTrace.Tests/AgriTrace.Tests.csproj --configuration Release --no-build --verbosity normal
