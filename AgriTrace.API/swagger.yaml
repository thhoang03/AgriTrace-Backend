components:
  schemas:
    ActiveStatusRequest:
      required:
        - isActive
      type: object
      properties:
        isActive:
          type: boolean
      additionalProperties: false
      description: Request body for toggling active status. Matches swagger `ActiveStatusRequest`.
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
      additionalProperties: false
      description: "Envelope chuẩn cho response thành công của API, khớp schema `ApiResponse` trong swagger.yaml.\r\nHình dạng: { success, data, message, timestamp }."
    BatchStatusRequest:
      required:
        - status
      type: object
      properties:
        status:
          type: integer
          format: int32
      additionalProperties: false
      description: Request body for setting a batch's status. Matches swagger `BatchStatusRequest`.
    CategoryRequest:
      required:
        - name
      type: object
      properties:
        name:
          maxLength: 100
          minLength: 1
          type: string
        description:
          maxLength: 500
          minLength: 0
          type: string
          nullable: true
      additionalProperties: false
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          nullable: true
        newPassword:
          type: string
          nullable: true
      additionalProperties: false
    CreateBatchRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        unitId:
          type: string
          format: uuid
        productionDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date
          nullable: true
      additionalProperties: false
      description: "Request body for creating a new batch. Matches swagger `CreateBatchRequest`.\r\nThe server generates the batch code; the client does not provide it."
    CreateInspectionRequest:
      required:
        - result
      type: object
      properties:
        result:
          maxLength: 4
          minLength: 4
          type: string
          description: 'Inspection result: "PASS" or "FAIL".'
        notes:
          maxLength: 1000
          minLength: 0
          type: string
          description: Optional notes about the inspection findings.
          nullable: true
      additionalProperties: false
      description: Request body for creating a new quality inspection on a batch.
    CreateRecallRequest:
      required:
        - reason
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        reason:
          minLength: 1
          type: string
        severity:
          maximum: 3
          minimum: 1
          type: integer
          format: int32
      additionalProperties: false
      description: "Request body for creating a recall. Matches swagger `CreateRecallRequest`.\r\nseverity: 1=LOW, 2=MEDIUM, 3=HIGH."
    CreateSupplyChainEventRequest:
      required:
        - eventTypeId
        - organizationId
        - performedByUserId
      type: object
      properties:
        eventTypeId:
          type: string
          description: 'The Id of the EventType (e.g. Harvest, Transport, Storage).'
          format: uuid
        organizationId:
          type: string
          description: The Id of the Organization performing this event.
          format: uuid
        performedByUserId:
          type: string
          description: The Id of the User who performed this event.
          format: uuid
        eventData:
          maxLength: 4000
          minLength: 0
          type: string
          description: JSON or plain-text payload describing the event details.
          nullable: true
        location:
          maxLength: 500
          minLength: 0
          type: string
          description: GPS coordinates or location name where the event took place.
          nullable: true
      additionalProperties: false
      description: Request body for recording a new supply chain event on a batch.
    CreateUserRequest:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request body for creating a user. Matches swagger `CreateUserRequest`.\r\norganizationId is nullable; role is a required string enum (ADMIN, MANAGER, STAFF, FARMER, INSPECTOR, CONSUMER)."
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          nullable: true
        timestamp:
          type: string
          format: date-time
      additionalProperties: false
      description: "Envelope chuẩn cho response lỗi của API, khớp schema `ErrorResponse` trong swagger.yaml.\r\nHình dạng: { success, data, message, errors[], timestamp }."
    FieldError:
      type: object
      properties:
        field:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
      additionalProperties: false
      description: "Mô tả một lỗi ở cấp field, khớp schema `FieldError` trong swagger.yaml.\r\nHình dạng: { field, code, message }."
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          nullable: true
      additionalProperties: false
    IssueCertificateRequest:
      required:
        - certificateType
        - fileUrl
        - inspectionId
        - issuedDate
      type: object
      properties:
        inspectionId:
          type: string
          description: Related inspection Id.
          format: uuid
        certificateType:
          minLength: 1
          type: string
          description: Certificate type.
        fileUrl:
          minLength: 1
          type: string
          description: URL to the certificate file.
        issuedDate:
          type: string
          description: Issued date.
          format: date
      additionalProperties: false
      description: Request body for issuing a new certificate on a batch.
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
      additionalProperties: false
    MergeBatchRequest:
      required:
        - sourceBatchIds
      type: object
      properties:
        sourceBatchIds:
          minItems: 2
          type: array
          items:
            type: string
            format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        unitId:
          type: string
          format: uuid
        productionDate:
          type: string
          format: date
      additionalProperties: false
      description: Request body for merging batches. Matches swagger `MergeBatchRequest` (min 2 sources).
    OrganizationRequest:
      required:
        - name
        - type
      type: object
      properties:
        name:
          maxLength: 200
          minLength: 1
          type: string
        type:
          minLength: 1
          type: string
          description: 'Organization type. One of: FARM, PROCESSOR, DISTRIBUTOR, RETAILER, INSPECTOR_ORG.'
        address:
          maxLength: 500
          minLength: 0
          type: string
          nullable: true
      additionalProperties: false
      description: Request body for creating/updating an organization. Matches swagger `OrganizationRequest`.
    ProductRequest:
      required:
        - name
      type: object
      properties:
        name:
          maxLength: 200
          minLength: 0
          type: string
        categoryId:
          type: string
          format: uuid
          nullable: true
        unit:
          maxLength: 50
          minLength: 0
          type: string
          description: Unit code/name (e.g. "kg").
          nullable: true
        unitId:
          type: string
          description: Direct Unit ID (Guid).
          format: uuid
          nullable: true
        organizationId:
          type: string
          format: uuid
          nullable: true
      additionalProperties: false
      description: "Request body for creating/updating a product.\r\nSupports both string Unit and UUID UnitId for frontend flexibility."
    ProductStatus:
      enum:
        - Created
        - Active
        - Inactive
      type: string
    ProductStatusRequest:
      required:
        - status
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProductStatus'
      additionalProperties: false
      description: Request body for setting a product's status.
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
      additionalProperties: false
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          nullable: true
        newPassword:
          type: string
          nullable: true
      additionalProperties: false
    ResolveRecallRequest:
      type: object
      properties:
        status:
          type: integer
          format: int32
      additionalProperties: false
      description: Request body for resolving a recall. Matches swagger `ResolveRecallRequest`.
    SplitBatchRequest:
      required:
        - splits
      type: object
      properties:
        splits:
          minItems: 2
          type: array
          items:
            $ref: '#/components/schemas/SplitItem'
      additionalProperties: false
      description: Request body for splitting a batch. Matches swagger `SplitBatchRequest` (min 2 splits).
    SplitItem:
      type: object
      properties:
        quantity:
          type: number
          format: double
        unitId:
          type: string
          format: uuid
      additionalProperties: false
    StatusRequest:
      required:
        - status
      type: object
      properties:
        status:
          minLength: 1
          type: string
      additionalProperties: false
      description: Request body for setting an organization's status. Matches swagger `StatusRequest`.
    SupplyChainEventResponse:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        eventTypeId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        performedByUserId:
          type: string
          format: uuid
        eventData:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        previousHash:
          type: string
          description: Hash of the previous event in the chain ("GENESIS" for the first event).
          nullable: true
        currentHash:
          type: string
          description: SHA-256 hash computed from PreviousHash + EventData.
          nullable: true
        eventTime:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
      description: Response payload for a supply chain event.
    UpdateBatchRequest:
      type: object
      properties:
        quantity:
          type: number
          format: double
          nullable: true
        expiryDate:
          type: string
          format: date
          nullable: true
      additionalProperties: false
      description: "Request body for updating an existing batch. Matches swagger `UpdateBatchRequest`.\r\nOnly `quantity` and `expiryDate` are updatable."
    UpdateInspectionRequest:
      required:
        - result
      type: object
      properties:
        result:
          maxLength: 4
          minLength: 4
          type: string
          description: 'Updated inspection result: "PASS" or "FAIL".'
        notes:
          maxLength: 1000
          minLength: 0
          type: string
          description: Updated notes about the inspection findings.
          nullable: true
      additionalProperties: false
      description: Request body for updating an existing quality inspection.
    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request body for updating a user. Matches swagger `UpdateUserRequest`.\r\nAll fields are optional. role is a string enum when provided."
    UserStatusRequest:
      type: object
      properties:
        isActive:
          type: boolean
      additionalProperties: false
      description: Request body for changing a user's active status. Matches swagger `UserStatusRequest`.
  securitySchemes:
    BearerAuth:
      type: http
      description: Enter JWT Bearer token
      scheme: bearer
      bearerFormat: JWT
security:
  - BearerAuth: [ ]
tags:
